<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日祝福卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #F8ECC2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        /* 图片容器：相对定位，用于文字居中 */
        .img-box {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 0;
        }

        /* 蛋糕图片 */
        .cake-img {
            width: 100%;
            display: block;
        }

        /* 文字：绝对定位，正中间 */
        #text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0,0,0,0.5), 0 2px 5px rgba(0,0,0,0.3);
            white-space: nowrap;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="img-box">
            <img class="cake-img" src="https://picsum.photos/id/292/500/500">
            <div id="text"></div>
        </div>
    </div>

    <script>
        const texts = ["祝老刘生日快乐", "Happy birthday", "天天开心"];
        const textEl = document.getElementById("text");
        let index = 0;

        function showText() {
            textEl.innerText = texts[index];
            index++;
            if (index < texts.length) {
                setTimeout(showText, 2000);
            }
        }

        showText();
    </script>
</body>
